name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-static-validation:
    name: Backend Static Validation
    runs-on: ubuntu-latest

    env:
      APP_ENV: ci
      APP_DEBUG: "false"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/employee_assistant
      JWT_SECRET_KEY: ci-test-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      QDRANT_HOST: localhost
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: employee_knowledge
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.2:3b
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      OCR_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      LOGIN_RATE_LIMIT_REQUESTS: "10"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "60"
      MAX_REQUEST_BODY_BYTES: "10485760"
      MAX_UPLOAD_FILE_BYTES: "10485760"
      APP_LOG_DIR: logs
      APP_LOG_FILE: logs/app.log
      APP_ERROR_LOG_FILE: logs/error.log
      APP_AUDIT_LOG_FILE: logs/audit.jsonl
      SLOW_REQUEST_THRESHOLD_MS: "1500"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt

      - name: Create runtime directories
        run: |
          mkdir -p logs
          mkdir -p storage/uploads
          mkdir -p storage/quarantine
          mkdir -p evals/reports

      - name: Compile backend source files
        run: |
          python -m compileall app

      - name: Compile backend scripts and evals
        run: |
          python -m py_compile evals/run_security_eval.py
          python -m py_compile evals/run_backend_smoke_tests.py
          if [ -f scripts/upsert_test_users.py ]; then python -m py_compile scripts/upsert_test_users.py; fi

      - name: Validate FastAPI app import
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Validate critical modules import
        run: |
          python -c "from app.security.llm_guardrails import guardrails; print('guardrails ok')"
          python -c "from app.security.document_domain_validator import document_domain_validator; print('domain validator ok')"
          python -c "from app.core.logging_config import setup_logging; print('logging config ok')"
          python -c "from app.services.audit_logger import audit_event; print('audit logger ok')"

      - name: Validate security eval files exist
        run: |
          test -f evals/security_attack_cases.json
          test -f evals/run_security_eval.py
          test -f evals/run_backend_smoke_tests.py

      - name: Block runtime files from being tracked
        run: |
          echo "Checking for accidentally committed runtime files..."

          if git ls-files | grep -E '^backend/logs/'; then
            echo "ERROR: backend/logs files are tracked. Remove them from Git."
            exit 1
          fi

          if git ls-files | grep -E '^backend/storage/'; then
            echo "ERROR: backend/storage files are tracked. Remove them from Git."
            exit 1
          fi

          if git ls-files | grep -E '^backend/evals/test_uploads/'; then
            echo "ERROR: backend/evals/test_uploads files are tracked. Remove them from Git."
            exit 1
          fi

          if git ls-files | grep -E '^backend/evals/reports/.*\.(json|csv)$'; then
            echo "ERROR: generated eval reports are tracked. Remove them from Git."
            exit 1
          fi

          if git ls-files | grep -E '^\.vscode/'; then
            echo "ERROR: .vscode files are tracked. Remove them from Git."
            exit 1
          fi

          echo "Runtime file tracking check passed."

      - name: Backend CI summary
        run: |
          echo "Backend CI validation completed successfully."