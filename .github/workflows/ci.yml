name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  merge_group:

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      APP_DEBUG: "false"

      DATABASE_URL: sqlite+pysqlite:///:memory:

      JWT_SECRET_KEY: ci-test-jwt-secret-key-that-is-not-used-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"

      QDRANT_HOST: localhost
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: ci_test_collection

      OCR_ENABLED: "false"

      APP_LOG_DIR: tests/output
      APP_LOG_FILE: tests/output/app.log
      APP_ERROR_LOG_FILE: tests/output/error.log
      APP_AUDIT_LOG_FILE: tests/output/audit.jsonl

      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CPU-only PyTorch
        run: |
          python -m pip install \
            torch==2.5.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Create test output directory
        run: mkdir -p tests/output

      - name: Compile backend source
        run: python -m compileall app scripts tests

      - name: Run backend tests
        run: python -m pytest -v

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend linting
        run: npm run lint

      - name: Build production frontend
        run: npm run build