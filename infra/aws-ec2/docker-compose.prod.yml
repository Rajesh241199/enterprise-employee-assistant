services:
  postgres:
    image: postgres:15
    container_name: internal_employee_assistant_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: employee_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: internal_employee_assistant_qdrant_prod
    restart: unless-stopped
    volumes:
      - qdrant_prod_data:/qdrant/storage

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: internal-employee-assistant-backend:prod
    container_name: internal_employee_assistant_backend_prod
    restart: unless-stopped
    env_file:
      - ../../backend/.env.production
    ports:
      - "8000:8000"
    volumes:
      - backend_prod_logs:/app/logs
      - backend_prod_uploads:/app/storage/uploads
      - backend_prod_quarantine:/app/storage/quarantine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - qdrant

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: internal-employee-assistant-frontend:prod
    container_name: internal_employee_assistant_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
  qdrant_prod_data:
  backend_prod_logs:
  backend_prod_uploads:
  backend_prod_quarantine: